services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - strikers-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-website-backend
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=development
      - FLARESOLVERR_URL=http://flaresolverr:8191
    env_file:
      - ./backend/.env
    volumes:
      # For live code reload during development
      - ./backend:/app
      - /app/node_modules  # Don't override container's node_modules
    restart: unless-stopped
    networks:
      - strikers-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-website-frontend
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - strikers-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: msc-website-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}   # Reads from .env file
    networks:
      - strikers-network
    depends_on:
      - backend
      - frontend

networks:
  strikers-network:
    driver: bridge
