version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-website-backend
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env
    volumes:
      # For live code reload during development
      - ./backend:/app
      - /app/node_modules  # Don't override container's node_modules
    restart: unless-stopped
    networks:
      - strikers-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-website-frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - strikers-network

networks:
  strikers-network:
    driver: bridge
