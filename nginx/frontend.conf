server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        return 301 /$is_args$args;
    }

    location = / {
        try_files /index.html =404;
    }

    location ~ ^/pages/([a-z0-9-]+)\.html$ {
        return 301 /$1$is_args$args;
    }

    location ~ ^/(about-us|community-tournaments|competitive|games|msbl|msbl-competitiverules|msbl-elo1v1|msbl-elo2v2|msbl-save-editor|msbl-tier-lists|msbl-whr|msc|msc-competitiverules|msc-elo1v1|msc-save-editor|msc-setup-guide|msc-tier-lists|msc-whr|msc-wiimmfi|msl|msl-leaderboards|msl-league-rules|msl-league-site|partners|players|players-msbl-clubs|players-profiles|privacy-policy|sms|sms-competitiverules|sms-elo1v1|sms-setup-guide|sms-tier-lists|sms-whr|tab-placeholder)/$ {
        return 301 /$1$is_args$args;
    }

    location /api/ {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ @clean_pages;
    }

    location @clean_pages {
        rewrite ^/$ /index.html break;
        rewrite ^/([a-z0-9-]+)/?$ /pages/$1.html break;
        return 404;
    }
}
